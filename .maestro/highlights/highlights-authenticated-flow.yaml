---
appId: org.versemate.app
name: Highlights CRUD Flow (Authenticated)
description: Tests highlight creation via verse tap, verification in list, and deletion for authenticated users
tags:
  - critical
  - auth
  - user-flow

---

# Highlights CRUD E2E Test (Authenticated)
#
# This flow tests full highlights lifecycle for authenticated users:
# 1. Create highlight via verse tap and color selection
# 2. Verify highlight appears in highlights list
# 3. Delete highlight (cleanup)
#
# Requires env vars: E2E_TEST_EMAIL, E2E_TEST_PASSWORD

- runFlow: ../shared/setup-authenticated.yaml

# Wait for Bible screen (Genesis 1)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

# Switch to Bible view to see verse text
- tapOn:
    id: "bible-view-toggle"

- waitForAnimationToEnd

# ============================================
# Test 1: Create Highlight via Verse Tap
# ============================================

# Wait for verse content to load after login redirect
- scrollUntilVisible:
    element:
      id: "verse-group-1"
    direction: DOWN
    timeout: 15000

# Step 1: Tap verse to open insight tooltip
- tapOn:
    id: "verse-group-1"

# Step 2: Wait for tooltip and tap "Save as My Highlight"
- extendedWaitUntil:
    visible:
      id: "verse-tooltip-save-highlight"
    timeout: 10000

- tapOn:
    id: "verse-tooltip-save-highlight"

# Step 3: Wait for color picker modal and select yellow
- extendedWaitUntil:
    visible:
      id: "color-button-yellow"
    timeout: 10000

- tapOn:
    id: "color-button-yellow"

# Step 4: Save the highlight
- tapOn:
    text: "Save Highlight"

# Wait for highlight to apply
- waitForAnimationToEnd

# ============================================
# Test 2: Verify Highlight in Highlights List
# ============================================

# Wait for Bible screen to settle after highlight save
- extendedWaitUntil:
    visible:
      id: "hamburger-menu-button"
    timeout: 10000

- waitForAnimationToEnd

# Open hamburger menu
- tapOn:
    id: "hamburger-menu-button"

- extendedWaitUntil:
    visible:
      id: "hamburger-menu"
    timeout: 15000

# Navigate to Highlights
- tapOn:
    id: "menu-item-highlights"

- waitForAnimationToEnd

# Verify highlights list is visible
- extendedWaitUntil:
    visible:
      id: "highlights-list"
    timeout: 10000

# Verify Genesis 1 highlight group is present
- assertVisible:
    id: "chapter-group-1-1"

# ============================================
# Test 3: Navigate Back (Cleanup)
# ============================================

# Go back to chapter screen
- tapOn:
    id: "highlights-back-button"

- waitForAnimationToEnd

# Verify we're back on chapter screen
- assertVisible:
    id: "chapter-selector-button"

# ============================================
# Test Complete
# ============================================
