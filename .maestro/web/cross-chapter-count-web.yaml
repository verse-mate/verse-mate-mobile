appId: org.versemate.web
url: http://localhost:8081
---
# Cross Chapter Count Navigation Web E2E Test
#
# Adapted from .maestro/regression/cross-chapter-count-navigation-test.yaml for Expo Web.
#
# Regression test for:
# - #80: Navigation Buttons Cause Chapter State Desync
# - #85: Missing Verse Insights Due to Navigation State Issues
# - #87: Chapter Mismatch/Lockup Bug Causing App-wide State Failures
#
# Tests extreme verse count differential: Psalm 119 (176 verses) vs Psalm 120 (7 verses).
#
# Web adaptation:
# - Uses repeated scroll commands instead of scrollUntilVisible (doesn't work in web modals)
# - Uses FAB button navigation instead of swipe (Selenium drag doesn't trigger scroll-snap)
# - Scrolls to bottom of chapter content to make FABs permanently visible
#
# Test Flow:
# 1. Navigate to Psalm 119 via picker
# 2. FAB forward to Psalm 120, verify header
# 3. FAB backward to Psalm 119, verify header
# 4. FAB forward to Psalm 120, verify header
# 5. FAB backward to Psalm 119, verify header
# 6. Assert no "No specific insight available" text visible
#
# Prerequisites:
#   EXPO_PUBLIC_API_URL=https://api.versemate.org npx expo start --web --port 8081
#
# Run:
#   maestro test .maestro/web/cross-chapter-count-web.yaml

- runFlow: ../shared/setup-web.yaml

# ============================================
# Setup: Navigate to Psalm 119 via picker
# ============================================

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

- tapOn:
    id: "chapter-selector-button"
- waitForAnimationToEnd

# Use filter to find Psalms (avoids scroll issues in web modals)
- tapOn:
    text: "Filter books..."
- inputText: "Psalms"
- waitForAnimationToEnd

- tapOn:
    id: "book-item-psalms"
- waitForAnimationToEnd

# Swipe UP inside the modal to scroll to chapter 119
- repeat:
    times: 12
    commands:
      - swipe:
          start: "50%,70%"
          end: "50%,30%"
          duration: 300

- tapOn:
    id: "chapter-119"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 15000

# Verify starting state
- assertVisible:
    text: "Psalms 119"

# ============================================
# Test 1: FAB forward -- Psalm 119 -> 120
# (176 verses -> 7 verses)
# ============================================

# Scroll to bottom to make FABs permanently visible
- repeat:
    times: 10
    commands:
      - scroll

- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

- assertVisible:
    text: "Psalms 120"

# ============================================
# Test 2: FAB backward -- Psalm 120 -> 119
# (7 verses -> 176 verses)
# ============================================

# Psalm 120 is short (7 verses) -- scroll to bottom
- repeat:
    times: 10
    commands:
      - scroll

- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 10000

- tapOn:
    id: "previous-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

- assertVisible:
    text: "Psalms 119"

# ============================================
# Test 3: FAB forward -- Psalm 119 -> 120
# ============================================

- repeat:
    times: 10
    commands:
      - scroll

- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

- assertVisible:
    text: "Psalms 120"

# ============================================
# Test 4: FAB backward -- Psalm 120 -> 119
# ============================================

- repeat:
    times: 10
    commands:
      - scroll

- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 10000

- tapOn:
    id: "previous-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

- assertVisible:
    text: "Psalms 119"

# ============================================
# Verify: No insight error text visible (#85)
# ============================================

# If navigation state is desynced, the app may show this error
- assertNotVisible:
    text: "No specific insight available"
    optional: true

# ============================================
# Test Complete: Header correctly synced across
# extreme verse count differential (176 vs 7)
# ============================================
