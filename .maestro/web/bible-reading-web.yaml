appId: org.versemate.web
url: http://localhost:8081
---
# Bible Reading Web E2E Test
#
# Adapted from .maestro/bible-reading/bible-reading-flow.yaml for web.
# Uses Maestro's web/browser support (Chromium).
#
# Prerequisites:
#   npx expo start --web --port 8081
#
# Run:
#   maestro test .maestro/web/bible-reading-web.yaml

- runFlow: ../shared/setup-web.yaml

# Verify we're on a chapter screen
- assertVisible:
    id: "chapter-selector-button"

# Wait for content to load
- waitForAnimationToEnd

# Verify Bible view icon is present
- assertVisible:
    id: "bible-view-toggle"

# Verify Explanations view icon is present
- assertVisible:
    id: "commentary-view-toggle"

# Ensure we're in Bible view
- tapOn:
    id: "bible-view-toggle"

- waitForAnimationToEnd

# Tabs should NOT be visible in Bible view
- assertNotVisible:
    id: "chapter-content-tabs"

# Switch to Explanations view
- tapOn:
    id: "commentary-view-toggle"

- waitForAnimationToEnd

# Tabs should now be visible
- assertVisible:
    id: "tab-summary"

# Chapter selector still visible after view switch
- assertVisible:
    id: "chapter-selector-button"
