appId: org.versemate.web
url: http://localhost:8081
---
# Book Crossing Navigation Web E2E Test
#
# Adapted from .maestro/swipe/book-crossing-swipe-test.yaml for Expo Web.
#
# Tests that header correctly updates book name when navigating
# across book boundaries.
#
# Web adaptation: Uses picker navigation instead of swipe
# (Selenium mouse drag doesn't trigger CSS scroll-snap on PagerView).
#
# Test Flow:
# 1. Navigate to Malachi 4 (last chapter of Old Testament) via picker
# 2. Navigate to Matthew 1 via picker -> Verify header shows "Matthew 1"
# 3. Navigate back to Malachi 4 via picker -> Verify header shows "Malachi 4"
#
# Prerequisites:
#   EXPO_PUBLIC_API_URL=https://api.versemate.org npx expo start --web --port 8081
#
# Run:
#   maestro test .maestro/web/book-crossing-swipe-web.yaml

- runFlow: ../shared/setup-web.yaml

# ============================================
# Setup: Navigate to Malachi 4 (last OT chapter)
# ============================================

# Wait for app to fully load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

# Open navigation modal and use filter to find Malachi
- tapOn:
    id: "chapter-selector-button"
- waitForAnimationToEnd

- tapOn:
    text: "Filter books..."
- inputText: "Malachi"
- waitForAnimationToEnd

- tapOn:
    id: "book-item-malachi"
- waitForAnimationToEnd

# Select chapter 4 (last chapter of OT)
- tapOn:
    id: "chapter-4"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 15000

# Verify we're on Malachi 4
- assertVisible:
    text: "Malachi 4"

# ============================================
# Test 1: Malachi 4 -> Matthew 1 (OT to NT via picker)
# ============================================

# Open navigation modal
- tapOn:
    id: "chapter-selector-button"

- extendedWaitUntil:
    visible:
      id: "bible-navigation-modal"
    timeout: 5000

# Switch to New Testament tab
- tapOn:
    id: "tab-new-testament"

- waitForAnimationToEnd


# Wait for NT books to load
- extendedWaitUntil:
    visible:
      id: "book-item-matthew"
    timeout: 10000

# Select Matthew
- tapOn:
    id: "book-item-matthew"

- waitForAnimationToEnd


# Select chapter 1
- tapOn:
    id: "chapter-1"

- waitForAnimationToEnd


# Modal should close
- extendedWaitUntil:
    notVisible:
      id: "bible-navigation-modal"
    timeout: 5000

# Verify header shows "Matthew 1" (first book of NT)
- assertVisible:
    text: "Matthew 1"

# ============================================
# Test 2: Matthew 1 -> Malachi 4 (NT back to OT via picker)
# ============================================

# Open navigation modal
- tapOn:
    id: "chapter-selector-button"

- extendedWaitUntil:
    visible:
      id: "bible-navigation-modal"
    timeout: 5000

# Use filter to find Malachi
- tapOn:
    text: "Filter books..."
- inputText: "Malachi"
- waitForAnimationToEnd

- tapOn:
    id: "book-item-malachi"
- waitForAnimationToEnd

# Select chapter 4
- tapOn:
    id: "chapter-4"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 15000

# Verify header shows "Malachi 4" (back to OT)
- assertVisible:
    text: "Malachi 4"

# ============================================
# Test Complete: OT/NT boundary crossing works
# ============================================
