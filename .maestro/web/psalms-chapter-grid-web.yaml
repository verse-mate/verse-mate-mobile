appId: org.versemate.web
url: http://localhost:8081
---
# Psalms Chapter Grid Scroll Web E2E Test
#
# Adapted from .maestro/navigation/psalms-chapter-grid-flow.yaml for Expo Web.
#
# Regression test for issue #82: chapter grid truncation in navigation modal
# for books with many chapters.
#
# This flow verifies that Psalms (150 chapters) renders all chapter buttons
# and that chapter 150 is reachable by scrolling.
#
# User Journey:
# 1. Launch app
# 2. Open navigation modal
# 3. Switch to Old Testament tab
# 4. Select Psalms (150 chapters)
# 5. Scroll down to chapter 150
# 6. Tap chapter 150 and verify navigation
#
# Prerequisites:
#   EXPO_PUBLIC_API_URL=https://api.versemate.org npx expo start --web --port 8081
#
# Run:
#   maestro test .maestro/web/psalms-chapter-grid-web.yaml

- runFlow: ../shared/setup-web.yaml

# Wait for app to load
- waitForAnimationToEnd

# Open navigation modal
- tapOn:
    id: "chapter-selector-button"

# Verify modal opened
- assertVisible:
    id: "bible-navigation-modal"

# Switch to Old Testament tab
- tapOn:
    id: "tab-old-testament"

# Wait for book list to load
- extendedWaitUntil:
    visible:
      id: "book-item-genesis"
    timeout: 5000

# Scroll to find Psalms (may not be visible in initial viewport)
- scrollUntilVisible:
    element:
      id: "book-item-psalms"
    direction: DOWN
    timeout: 10000

# Select Psalms from book list
- tapOn:
    id: "book-item-psalms"

# Wait for chapter grid to appear
- waitForAnimationToEnd

# Verify first chapter is visible
- assertVisible:
    id: "chapter-1"

# Scroll down to chapter 150 (the last chapter in Psalms)
- scrollUntilVisible:
    element:
      id: "chapter-150"
    direction: DOWN
    timeout: 30000

# Tap chapter 150
- tapOn:
    id: "chapter-150"

# Modal should close and navigate to Psalms 150
- waitForAnimationToEnd

# Verify modal closed
- assertNotVisible:
    id: "bible-navigation-modal"

# Verify we're on the new chapter (chapter selector button still visible)
- assertVisible:
    id: "chapter-selector-button"
