---
appId: org.versemate.app
name: Chapter Navigation Flow
description: Tests chapter navigation using floating action buttons
tags:
  - critical
  - navigation
  - bible

---

# Chapter Navigation E2E Test
#
# This flow tests chapter navigation using floating action buttons:
# - Next chapter button
# - Previous chapter button
#
# Strategy: Scroll to bottom to trigger isAtBottom state, which keeps
# FABs permanently visible (no auto-hide timeout). This is more reliable
# on CI than tap-to-show, which requires <200ms touch duration.

- runFlow: ../shared/setup.yaml

# Wait for app to load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

# Verify we start at Genesis 1
- assertVisible:
    text: "Genesis 1"

# Scroll to bottom to keep FABs permanently visible (isAtBottom = true)
- scroll
- scroll
- scroll

# Wait for FABs to appear
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 5000

# Test next chapter button -> Genesis 2
- tapOn:
    id: "next-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

# Verify we're on Genesis 2
- assertVisible:
    text: "Genesis 2"

# Scroll to bottom again for the new chapter
- scroll
- scroll
- scroll

- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 5000

# Test next chapter again -> Genesis 3
- tapOn:
    id: "next-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

# Verify we're on Genesis 3
- assertVisible:
    text: "Genesis 3"

# Scroll to bottom for FABs
- scroll
- scroll
- scroll

- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 5000

# Test previous chapter -> Genesis 2
- tapOn:
    id: "previous-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

# Verify we're on Genesis 2
- assertVisible:
    text: "Genesis 2"

# Scroll to bottom for FABs
- scroll
- scroll
- scroll

- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 5000

# Test previous chapter again -> Genesis 1
- tapOn:
    id: "previous-chapter-button"

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 10000

# Verify we're back on Genesis 1
- assertVisible:
    text: "Genesis 1"
