appId: org.versemate.app
---
# CI Warm-up Flow for tablet: First launch with clearState to download
# EAS Update, complete onboarding, and initialize the seed database.
# Waits for split-view ID instead of chapter-selector-button.
#
# NOT intended for direct use in tests — use setup-warm-tablet.yaml instead.

- launchApp:
    clearState: true
    appId: org.versemate.app

# Wait for onboarding — extended timeout for first EAS Update download
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 60000

# Complete onboarding
- tapOn:
    text: "Skip"

# Wait for split-view layout to render (tablet in landscape)
- extendedWaitUntil:
    visible:
      id: "split-view"
    timeout: 30000
