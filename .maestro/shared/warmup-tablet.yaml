appId: org.versemate.app
---
# CI Warm-up Flow for tablet: Complete onboarding after ADB pre-launch
# has already triggered the EAS Update download and seed DB extraction.
# Waits for split-view ID instead of chapter-selector-button.
#
# NOT intended for direct use in tests — use setup-warm-tablet.yaml instead.

- launchApp:
    clearState: false
    appId: org.versemate.app

# Complete onboarding if still showing
- tapOn:
    text: "Skip"
    optional: true

# Wait for split-view layout to render (tablet in landscape)
- extendedWaitUntil:
    visible:
      id: "split-view"
    timeout: 45000
