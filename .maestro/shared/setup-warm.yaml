appId: org.versemate.app
---
# Warm app setup: launch WITHOUT clearing state, wait for Bible screen.
# Use this for tests that need pre-initialized state (topics, split-view).
#
# Since the warm launch (adb shell monkey) doesn't complete onboarding,
# this flow handles both scenarios:
# - If onboarding is showing: tap Skip, then wait for Bible screen
# - If already past onboarding: wait for Bible screen directly
#
# Usage from any test subfolder: - runFlow: ../shared/setup-warm.yaml

- launchApp:
    clearState: false
    appId: org.versemate.app

# Handle onboarding if it appears (it will on first launch after warm launch)
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 30000

- tapOn:
    text: "Skip"

# Wait for main Bible screen to load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000
