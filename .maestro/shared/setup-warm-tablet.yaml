appId: org.versemate.app
---
# Tablet test setup: clearState:true ensures clean split-view initialization.
# Note: EAS Update + seed DB are already primed by the CI warmup step.
#
# Usage: - runFlow: ../shared/setup-warm-tablet.yaml

- launchApp:
    clearState: true
    appId: org.versemate.app

# Tap Skip if onboarding is showing (optional — clearState may re-trigger it)
- tapOn:
    text: "Skip"
    optional: true

# Wait for split-view layout to render (tablet in landscape, width >= 1024dp)
# Extended timeout: clearState forces EAS Update re-download from CDN (primed)
- extendedWaitUntil:
    visible:
      id: "split-view"
    timeout: 120000
