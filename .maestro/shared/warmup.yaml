appId: org.versemate.app
---
# CI Warm-up Flow: clearState:true to ensure a clean app initialization.
# The ADB pre-launch step primes the CDN cache so the EAS Update
# re-download is fast even after state is cleared.
#
# NOT intended for direct use in tests — use setup-warm.yaml instead.

- launchApp:
    clearState: true
    appId: org.versemate.app

# Wait for onboarding — extended timeout for EAS Update (CDN primed)
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 90000

# Complete onboarding
- tapOn:
    text: "Skip"

# Wait for Bible screen to fully load (seed DB extraction)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000
