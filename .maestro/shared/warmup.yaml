appId: org.versemate.app
---
# CI Warm-up Flow: First launch with clearState to download EAS Update,
# complete onboarding, and initialize the seed database.
#
# This runs ONCE at the start of CI with an extended timeout and retry.
# All subsequent tests use setup-warm.yaml (clearState: false) to reuse
# the initialized state, avoiding repeated EAS Update downloads.
#
# NOT intended for direct use in tests — use setup-warm.yaml instead.

- launchApp:
    clearState: true
    appId: org.versemate.app

# Wait for onboarding — extended timeout for first EAS Update download
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 60000

# Complete onboarding
- tapOn:
    text: "Skip"

# Wait for Bible screen to fully load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000
