appId: org.versemate.app
---
# CI Warm-up Flow: clearState:false preserves EAS Update + seed DB from
# the ADB pre-launch phase. This avoids re-downloading EAS Update which
# is unreliable on CI (flaky network, ANR dialogs).
#
# Skip tap is optional since onboarding may already be completed during
# ADB pre-launch. We wait for chapter-selector-button with 90s timeout
# which covers both fresh and warm starts.
#
# NOT intended for direct use in tests — use setup-warm.yaml instead.

- launchApp:
    clearState: false
    appId: org.versemate.app

# Tap Skip if onboarding is showing (optional — may already be done)
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen to fully load (seed DB extraction)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 90000
