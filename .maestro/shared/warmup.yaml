appId: org.versemate.app
---
# CI Warm-up Flow: Complete onboarding after ADB pre-launch has already
# triggered the EAS Update download and seed DB extraction.
#
# Uses clearState: false to PRESERVE the EAS Update and seed DB that
# were initialized during the ADB pre-launch step in the CI script.
#
# NOT intended for direct use in tests — use setup-warm.yaml instead.

- launchApp:
    clearState: false
    appId: org.versemate.app

# Complete onboarding if still showing (may already be past this screen)
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen to fully load (seed DB + EAS Update must be ready)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 45000
