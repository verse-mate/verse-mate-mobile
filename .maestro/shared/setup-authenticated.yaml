appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup: launch app with pre-seeded auth tokens.
#
# Auth tokens are seeded into AsyncStorage by the CI script
# (.github/scripts/seed-auth-tokens.sh) BEFORE Maestro tests run.
# This avoids Maestro's inputText limitation on secureTextEntry fields
# on Android (known issue: mobile-dev-inc/maestro#1061).
#
# The app's restoreSession() automatically picks up the stored tokens
# and authenticates the user on launch.
#
# For local testing, run the seed script manually first:
#   bash .github/scripts/seed-auth-tokens.sh
#
# Or use .maestro/.env with E2E_TEST_EMAIL and E2E_TEST_PASSWORD.

# Launch app WITHOUT clearState to preserve the seeded tokens
- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears (may not appear if state preserved)
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen (restoreSession picks up stored tokens automatically)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
