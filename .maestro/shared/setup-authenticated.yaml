appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# In e2e-test builds, secureTextEntry is disabled on password fields
# (workaround for Maestro Android issue #1061). This allows inputText
# to type passwords normally.
#
# IMPORTANT: Uses clearState: false to preserve EAS Update cache.
# clearState: true wipes the OTA update, causing the app to fail to load.
#
# Requires env vars: E2E_TEST_EMAIL, E2E_TEST_PASSWORD

# Stop and restart app (preserves EAS Update + onboarding completion)
- stopApp:
    appId: org.versemate.app

- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears (unlikely with preserved state)
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000

# Logout if already authenticated (from a previous test)
- tapOn:
    id: "hamburger-menu-button"

- extendedWaitUntil:
    visible:
      id: "hamburger-menu"
    timeout: 5000

# Check if already logged in — if logout is visible, tap it first
- runFlow:
    when:
      visible:
        id: "menu-item-logout"
    commands:
      - tapOn:
          id: "menu-item-logout"
      - extendedWaitUntil:
          visible:
            id: "chapter-selector-button"
          timeout: 10000
      # Re-open menu after logout
      - tapOn:
          id: "hamburger-menu-button"
      - extendedWaitUntil:
          visible:
            id: "hamburger-menu"
          timeout: 5000

# Navigate to login
- tapOn:
    id: "menu-item-login"

- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 10000

# Enter email
- tapOn:
    id: "login-email"
- inputText: "${E2E_TEST_EMAIL}"

# Enter password (secureTextEntry disabled in e2e-test builds)
- tapOn:
    id: "login-password"
- inputText: "${E2E_TEST_PASSWORD}"

# Submit
- hideKeyboard
- tapOn:
    id: "login-submit"

# Wait for redirect back to Bible screen
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
