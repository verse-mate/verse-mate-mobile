appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# Auth tokens + cached user are seeded into AsyncStorage by the CI script
# (seed-auth-tokens.sh) before each auth test folder. This flow cold-launches
# the app so restoreSession() reads the seeded data.
#
# IMPORTANT: clearState:false preserves seeded tokens. The app may display
# an error state for chapter content (CI emulator has no outbound API),
# but the authenticated state (menu shows logout, not login) works.

# Cold launch — triggers restoreSession() with seeded tokens + cached user
- stopApp:
    appId: org.versemate.app

- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for ANY app screen to load — chapter-selector-button shows even in
# error state (displays "Error 1" instead of chapter name)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
