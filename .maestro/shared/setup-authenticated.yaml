appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# In e2e-test builds, secureTextEntry is disabled on password fields
# (workaround for Maestro Android issue #1061). This allows inputText
# to type passwords normally without any toggle or deep link hacks.
#
# Requires env vars: E2E_TEST_EMAIL, E2E_TEST_PASSWORD

- launchApp:
    appId: org.versemate.app
    clearState: true

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000

# Navigate to login
- tapOn:
    id: "hamburger-menu-button"

- extendedWaitUntil:
    visible:
      id: "hamburger-menu"
    timeout: 5000

- tapOn:
    id: "menu-item-login"

- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 10000

# Enter email
- tapOn:
    id: "login-email"
- inputText: "${E2E_TEST_EMAIL}"

# Enter password (secureTextEntry disabled in e2e-test builds)
- tapOn:
    id: "login-password"
- inputText: "${E2E_TEST_PASSWORD}"

# Submit
- hideKeyboard
- tapOn:
    id: "login-submit"

# Wait for redirect back to Bible screen
# Extended timeout: login makes 2 API calls (postAuthLogin + fetchUserSession)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
