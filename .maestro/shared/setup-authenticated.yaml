appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# The e2e-test EAS build has EXPO_PUBLIC_E2E_AUTO_LOGIN_EMAIL and
# EXPO_PUBLIC_E2E_AUTO_LOGIN_PASSWORD baked in. AuthContext auto-logs in
# on mount when these env vars are present — no password typing needed.
#
# This flow simply launches the app with clean state and waits for it
# to finish auto-login + load the Bible screen.

- launchApp:
    appId: org.versemate.app
    clearState: true

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen (auto-login happens during mount)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
