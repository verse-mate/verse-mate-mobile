appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# Logs in via the actual login screen using typed credentials.
# Uses clearState:true for a clean state (seed DB works for chapters).
# secureTextEntry is disabled in e2e-test builds (EXPO_PUBLIC_APP_ENV).
#
# Requires env vars: E2E_TEST_EMAIL, E2E_TEST_PASSWORD

# Fresh launch — clearState:true gives clean seed DB for chapters
- launchApp:
    appId: org.versemate.app
    clearState: true

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen to load (from seed DB)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000

# Navigate to login: hamburger menu → Log In
- tapOn:
    id: "hamburger-menu-button"

- extendedWaitUntil:
    visible:
      id: "hamburger-menu"
    timeout: 5000

- tapOn:
    id: "menu-item-login"

# Wait for login screen
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 10000

# Type email
- tapOn:
    id: "login-email"
- inputText: ${E2E_TEST_EMAIL}

# Type password (secureTextEntry disabled in e2e-test builds)
- tapOn:
    id: "login-password"
- inputText: ${E2E_TEST_PASSWORD}

# Hide keyboard before tapping submit
- hideKeyboard

# Submit login
- tapOn:
    id: "login-submit"

# Wait for redirect back to Bible screen (login success)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000
