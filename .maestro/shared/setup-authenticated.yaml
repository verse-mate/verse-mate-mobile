appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup: launch app with pre-seeded auth tokens.
#
# Auth tokens are seeded into AsyncStorage by the CI script BEFORE each
# folder that contains authenticated tests. The app's restoreSession()
# reads tokens from AsyncStorage on cold launch and auto-authenticates.
#
# IMPORTANT: Uses stopApp + launchApp to force a cold launch so
# restoreSession() re-reads AsyncStorage (hot resume won't re-read).

# Force-kill the app to ensure a cold launch
- stopApp:
    appId: org.versemate.app

# Cold launch — restoreSession() will find the seeded tokens in AsyncStorage
- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears (may not appear if state preserved)
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen (restoreSession picks up stored tokens)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
