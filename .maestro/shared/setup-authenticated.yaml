appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# Auth tokens are pre-seeded into AsyncStorage by the CI script
# (seed-auth-tokens.sh) which calls the API from the HOST machine
# (the Android emulator can't reach api.versemate.org directly).
#
# This flow just stops and relaunches the app. On launch, the
# AuthContext's restoreSession() finds the seeded tokens in
# AsyncStorage and auto-authenticates.
#
# IMPORTANT: clearState: false — preserves both EAS Update cache
# AND the seeded auth tokens.

# Stop and cold-launch (triggers restoreSession with seeded tokens)
- stopApp:
    appId: org.versemate.app

- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for Bible screen (restoreSession auto-authenticates)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000
