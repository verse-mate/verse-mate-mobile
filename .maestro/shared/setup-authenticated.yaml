appId: org.versemate.app
name: Setup Authenticated Session
tags:
  - setup
  - auth
---
# Shared authenticated setup for E2E tests.
#
# Auth tokens are seeded into AsyncStorage by the CI script before each
# auth test folder. This flow cold-launches the app (clearState:false to
# preserve tokens + EAS Update), then navigates to Genesis 1 to ensure
# a clean Bible screen.
#
# The CI script re-seeds tokens before each auth folder, so even if a
# previous test's clearState wiped them, they're fresh.

# Cold launch — preserves seeded tokens + EAS Update cache
- stopApp:
    appId: org.versemate.app

- launchApp:
    appId: org.versemate.app
    clearState: false

# Tap Skip if onboarding appears
- tapOn:
    text: "Skip"
    optional: true

# Wait for any screen to load (might be error page or Bible)
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 60000

# Navigate to Genesis 1 explicitly (in case app is on a broken route)
- tapOn:
    id: "chapter-selector-button"

- extendedWaitUntil:
    visible:
      id: "bible-navigation-modal"
    timeout: 5000

# Select OT tab and Genesis
- tapOn:
    id: "tab-old-testament"
    optional: true

- tapOn:
    id: "book-item-genesis"

- extendedWaitUntil:
    visible:
      id: "chapter-1"
    timeout: 5000

- tapOn:
    id: "chapter-1"

# Wait for Genesis 1 to load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000
