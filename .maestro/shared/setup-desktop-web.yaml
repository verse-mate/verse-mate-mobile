appId: org.versemate.web
url: http://localhost:8081
---
# Shared desktop web setup: open app in browser, skip onboarding, wait for split view.
# Usage: - runFlow: ../shared/setup-desktop-web.yaml
#
# Requires:
#   - Xvfb at >= 1920x1080 (so Chromium viewport >= 1024px triggers split view)
#   - EXPO_PUBLIC_API_URL=https://api.versemate.org npx expo start --web --port 8081

# Open the web app in Maestro's managed Chromium
- openLink: "http://localhost:8081"

# Wait for onboarding screen to fully load
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 60000

# Skip onboarding
- tapOn:
    text: "Skip"

# Dismiss font loading error overlays (headless Chromium may timeout on icon fonts)
- runFlow:
    when:
      visible: "Dismiss"
    commands:
      - tapOn: "Dismiss"

# Wait for split view to render (desktop viewport >= 1024px triggers split view)
- extendedWaitUntil:
    visible:
      id: "split-view"
    timeout: 60000
