---
appId: org.versemate.app
name: Dictionary Lookup Flow
description: Tests dictionary word definition lookup via long-press on Bible verse text
tags:
  - dictionary
  - user-flow
  - critical

---

# Dictionary Lookup E2E Test Flow
#
# This flow tests the dictionary/definition feature:
# 1. Navigate to a chapter with known content (Genesis 1)
# 2. Long-press on a word in the verse text to trigger definition lookup
# 3. Verify the word definition tooltip appears
# 4. Verify definition content is displayed (not "no definition found")
# 5. Dismiss the tooltip
#
# Covers: GH-193 (dictionary fuzzy matching)

- runFlow: ../shared/setup.yaml

# Wait for app to fully load
- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

# ============================================
# Test 1: Navigate to Genesis 1 (known content)
# ============================================

# Verify we're on a chapter screen
- assertVisible:
    id: "chapter-selector-button"

# ============================================
# Test 2: Long-press on verse text to trigger dictionary
# ============================================

# Long-press on the word "God" which should be in Genesis 1
# Using text matching since verse text doesn't have per-word testIDs
- longPressOn:
    text: "God"

# ============================================
# Test 3: Verify dictionary tooltip appears
# ============================================

# Wait for the word definition tooltip to appear
- extendedWaitUntil:
    visible:
      id: "word-definition-tooltip"
    timeout: 5000

# Verify the tooltip shows definition content (not just loading)
- assertVisible:
    id: "word-definition-tooltip"

# ============================================
# Test 4: Dismiss tooltip
# ============================================

# Swipe down to dismiss the tooltip
- swipe:
    direction: DOWN
    duration: 300

# Wait for dismiss animation
- waitForAnimationToEnd

# Verify tooltip is gone
- assertNotVisible:
    id: "word-definition-tooltip"

# Verify we're still on the chapter screen
- assertVisible:
    id: "chapter-selector-button"

# ============================================
# Test Complete
# ============================================
