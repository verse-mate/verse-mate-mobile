---
appId: org.versemate.app
name: Rapid FAB Navigation Test
description: Regression test for #80/#87 — rapidly taps FAB buttons 5 forward + 3 backward and verifies header stays in sync after each tap
tags:
  - critical
  - regression
  - navigation

---

# Rapid FAB Navigation Stress Test
#
# Regression test for:
# - #80: Navigation Buttons Cause Chapter State Desync
# - #87: Chapter Mismatch/Lockup Bug Causing App-wide State Failures
#
# Mirrors swipe-header-sync-test.yaml but uses FAB buttons instead of swipes.
# The original bug was triggered by using left/right arrow buttons to navigate.
#
# Test Flow:
# 1. Navigate to Genesis 1 via picker (known starting state)
# 2. Tap next-chapter-button 5 times, verify header after each
# 3. Tap previous-chapter-button 3 times, verify header after each
# 4. Final assertion: header shows "Genesis 3"

- runFlow: ../shared/setup.yaml

# ============================================
# Setup: Navigate to Genesis 1 via picker
# ============================================

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

- tapOn:
    id: "chapter-selector-button"

- extendedWaitUntil:
    visible:
      id: "bible-navigation-modal"
    timeout: 5000

- tapOn:
    id: "tab-old-testament"

- waitForAnimationToEnd


- tapOn:
    id: "book-item-genesis"

- waitForAnimationToEnd


- tapOn:
    id: "chapter-1"

- waitForAnimationToEnd


- extendedWaitUntil:
    notVisible:
      id: "bible-navigation-modal"
    timeout: 5000

# Verify starting state
- assertVisible:
    text: "Genesis 1"

# ============================================
# Test: 5 rapid forward taps (Genesis 1 → 6)
# ============================================

# Forward 1: Genesis 1 → Genesis 2
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 2"

# Forward 2: Genesis 2 → Genesis 3
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 3"

# Forward 3: Genesis 3 → Genesis 4
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 4"

# Forward 4: Genesis 4 → Genesis 5
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 5"

# Forward 5: Genesis 5 → Genesis 6
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 6"

# ============================================
# Test: 3 rapid backward taps (Genesis 6 → 3)
# ============================================

# Backward 1: Genesis 6 → Genesis 5
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 5"

# Backward 2: Genesis 5 → Genesis 4
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 4"

# Backward 3: Genesis 4 → Genesis 3
- tapOn:
    point: "50%,50%"

- waitForAnimationToEnd


- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 3"

# ============================================
# Test Complete: Header correctly synced
# through 8 FAB navigations (5 fwd + 3 bwd)
# ============================================
