---
appId: org.versemate.app
name: Rapid FAB Navigation Test
description: Regression test for #80/#87 — rapidly taps FAB buttons 5 forward + 3 backward and verifies header stays in sync after each tap
tags:
  - critical
  - regression
  - navigation

---

# Rapid FAB Navigation Stress Test
#
# Regression test for:
# - #80: Navigation Buttons Cause Chapter State Desync
# - #87: Chapter Mismatch/Lockup Bug Causing App-wide State Failures
#
# Mirrors swipe-header-sync-test.yaml but uses FAB buttons instead of swipes.
# The original bug was triggered by using left/right arrow buttons to navigate.
#
# Test Flow:
# 1. Navigate to Genesis 3 via picker (avoids starting chapter edge case)
# 2. Tap next-chapter-button 5 times, verify header after each
# 3. Tap previous-chapter-button 3 times, verify header after each
# 4. Final assertion: header shows "Genesis 5"

- runFlow: ../shared/setup.yaml

# ============================================
# Setup: Navigate to Genesis 3 via picker
# ============================================

- extendedWaitUntil:
    visible:
      id: "chapter-selector-button"
    timeout: 30000

- tapOn:
    id: "chapter-selector-button"

- extendedWaitUntil:
    visible:
      id: "bible-navigation-modal"
    timeout: 5000

- tapOn:
    id: "tab-old-testament"

- waitForAnimationToEnd


- tapOn:
    id: "book-item-genesis"

- waitForAnimationToEnd


- tapOn:
    id: "chapter-3"

- waitForAnimationToEnd


- extendedWaitUntil:
    notVisible:
      id: "bible-navigation-modal"
    timeout: 5000

# Verify starting state
- assertVisible:
    text: "Genesis 3"

# ============================================
# Test: 5 rapid forward taps (Genesis 3 → 8)
# ============================================

# Forward 1: Genesis 3 → Genesis 4
# FABs are initially visible for 3s after chapter load — catch them directly
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 4"

# Forward 2: Genesis 4 → Genesis 5
# FABs stay visible briefly after navigation interaction
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 5"

# Forward 3: Genesis 5 → Genesis 6
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 6"

# Forward 4: Genesis 6 → Genesis 7
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 7"

# Forward 5: Genesis 7 → Genesis 8
- extendedWaitUntil:
    visible:
      id: "next-chapter-button"
    timeout: 10000

- tapOn:
    id: "next-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 8"

# ============================================
# Test: 3 rapid backward taps (Genesis 8 → 5)
# ============================================

# Backward 1: Genesis 8 → Genesis 7
- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 10000

- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 7"

# Backward 2: Genesis 7 → Genesis 6
- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 10000

- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 6"

# Backward 3: Genesis 6 → Genesis 5
- extendedWaitUntil:
    visible:
      id: "previous-chapter-button"
    timeout: 10000

- tapOn:
    id: "previous-chapter-button"

- waitForAnimationToEnd


- assertVisible:
    text: "Genesis 5"

# ============================================
# Test Complete: Header correctly synced
# through 8 FAB navigations (5 fwd + 3 bwd)
# ============================================
