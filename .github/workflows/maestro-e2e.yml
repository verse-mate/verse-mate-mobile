name: Maestro E2E Tests

on:
  workflow_dispatch:
    inputs:
      test-folder:
        description: 'Test subfolder (e.g., swipe, auth, topics). Empty = all.'
        required: false
        type: string
        default: ''
      force-rebuild:
        type: boolean
        default: false
        description: "Build fresh APK (only needed for native changes). Default: reuse latest + OTA update."

jobs:
  maestro-e2e:
    name: Maestro E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          $HOME/.maestro/bin/maestro --version

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── APK: reuse latest or build fresh ────────────────────────────
      - name: Build fresh APK (native changes only)
        if: github.event.inputs.force-rebuild == 'true'
        id: eas_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Triggering EAS e2e-test build for Android..."
          eas build --platform android --profile e2e-test --non-interactive --wait --json > build_output.json

          APK_URL=$(jq -r '.[0].artifacts.buildUrl' build_output.json)
          BUILD_ID=$(jq -r '.[0].id' build_output.json)

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "Error: Failed to extract APK download URL"
            cat build_output.json
            exit 1
          fi

          echo "Build ID: $BUILD_ID"
          curl -L -o app.apk "$APK_URL"

          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Download latest APK from EAS
        if: github.event.inputs.force-rebuild != 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Fetching latest e2e-test APK from EAS..."
          BUILD_JSON=$(eas build:list --platform android --profile e2e-test --status finished --limit 1 --non-interactive --json)

          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "Error: No existing e2e-test APK found. Re-run with force-rebuild=true."
            exit 1
          fi

          echo "Reusing APK from build $BUILD_ID"
          curl -L -o app.apk "$APK_URL"

      # ── OTA: push JS changes to the existing APK ───────────────────
      - name: Push OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Pushing JS update to e2e-test branch..."
          eas update --branch e2e-test --message "E2E update for ${{ github.sha }}" --non-interactive

      # ── Tests ───────────────────────────────────────────────────────
      - name: Run phone tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash .github/scripts/run-phone-tests.sh "${{ github.event.inputs.test-folder }}"

      - name: Run split-view tests on Android tablet emulator
        if: success() || failure()
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 10
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -skin 2560x1600
          disable-animations: true
          script: bash .github/scripts/run-tablet-tests.sh "${{ github.event.inputs.test-folder }}"

      # ── Artifacts ──────────────────────────────────────────────────
      - name: Upload Maestro test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: ~/.maestro/tests/
          retention-days: 14

      - name: Capture emulator logcat
        if: failure()
        timeout-minutes: 1
        run: adb logcat -d > emulator-logcat.txt || true

      - name: Upload emulator logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logs
          path: emulator-logcat.txt
          retention-days: 14

      - name: Workflow summary
        if: always()
        run: |
          TEST_FOLDER="${{ github.event.inputs.test-folder }}"
          if [ -z "$TEST_FOLDER" ]; then
            TEST_TARGET="all test folders"
          else
            TEST_TARGET=".maestro/$TEST_FOLDER/"
          fi

          FORCE_REBUILD="${{ github.event.inputs.force-rebuild }}"
          if [ "$FORCE_REBUILD" = "true" ]; then
            APK_SOURCE="Fresh EAS build (${{ steps.eas_build.outputs.build_id }})"
          else
            APK_SOURCE="Latest e2e-test APK (reused) + OTA update"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Maestro E2E Test Results

          | Property | Value |
          |----------|-------|
          | **Test Target** | $TEST_TARGET |
          | **APK Source** | $APK_SOURCE |
          | **Phone Emulator** | Pixel 6, API 34 |
          | **Tablet Emulator** | Nexus 10, API 34 |
          | **OTA Update** | e2e-test branch, ${{ github.sha }} |

          ### How it works
          - **Default**: Downloads the latest \`e2e-test\` APK from EAS, pushes an OTA JS update, then runs tests.
          - **force-rebuild=true**: Builds a fresh APK via EAS (only needed when native code changes — new SDK, native modules, etc.)
          EOF
